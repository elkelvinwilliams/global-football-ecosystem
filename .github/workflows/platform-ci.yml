name: Platform CI

on:
  pull_request:
    paths: ["platform/**", ".github/workflows/platform-ci.yml"]
  push:
    branches: [main]
    paths: ["platform/**", ".github/workflows/platform-ci.yml"]

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: platform }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --if-present run typecheck
      - run: pnpm -r --if-present run test
      - run: pnpm --filter @gfe/contracts build

  prisma-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      # Pin to the Prisma major the schema targets — bare `npx prisma`
      # resolves to latest and breaks on major syntax changes.
      - run: npx --yes prisma@5.20.0 validate --schema platform/packages/db/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  security-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Secret scan (diff against base)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
